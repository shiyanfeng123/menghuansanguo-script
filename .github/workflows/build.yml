name: Build Windows EXE

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare build environment
        run: |
          if (-not (Test-Path "serveAssets\plugins\dm.dll")) {
            Write-Host "::error::dm.dll missing"
            exit 1
          }
          Write-Host "dm.dll OK, size: $((Get-Item serveAssets\plugins\dm.dll).Length)"
          if (-not (Test-Path "user_scripts")) {
            New-Item -ItemType Directory -Path user_scripts -Force
          }
          python -c "import py_compile; py_compile.compile('serveScript.py', doraise=True)"
          Write-Host "Python syntax check passed"
        shell: pwsh

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        id: build
        run: |
          pyinstaller serveScript.spec --noconfirm
          $exit = $LASTEXITCODE
          Write-Host "PyInstaller exit code: $exit"
          $exes = Get-ChildItem -Path dist -Filter "*.exe" -ErrorAction SilentlyContinue
          foreach ($e in $exes) {
            Write-Host "Found exe: $($e.FullName) ($($e.Length) bytes)"
          }
          if ($exes.Count -eq 0) {
            Write-Host "::error::No exe files found in dist/"
            exit 1
          }
        shell: pwsh

      - name: Prepare release exe
        run: |
          New-Item -ItemType Directory -Path release -Force
          $exes = Get-ChildItem -Path dist -Filter "*.exe"
          $src = $exes[0]
          $dest = "release\脚本v26.6.1.exe"
          Copy-Item $src.FullName -Destination $dest
          Write-Host "Release exe: $dest ($((Get-Item $dest).Length) bytes)"
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: menghuansanguo-script
          path: release/*.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "脚本v26.6.1 自动构建 #${{ github.run_number }}"
          body: |
            由 GitHub Actions 自动构建
            提交: ${{ github.sha }}
            时间: ${{ github.event.head_commit.timestamp }}
            直接下载下方 exe 文件即可使用
          files: release/*.exe
          make_latest: true
