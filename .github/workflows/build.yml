name: Build Windows EXE

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 32-bit
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x86'

      - name: Prepare build environment
        run: |
          if (-not (Test-Path "serveAssets\plugins\dm.dll")) {
            Write-Host "::error::dm.dll missing"
            exit 1
          }
          Write-Host "dm.dll OK, size: $((Get-Item serveAssets\plugins\dm.dll).Length)"
          if (-not (Test-Path "user_scripts")) {
            New-Item -ItemType Directory -Path user_scripts -Force
          }
          python -c "import py_compile; py_compile.compile('serveScript.py', doraise=True)"
          Write-Host "Python syntax check passed"
          $v = Get-Content "version.json" -Raw | ConvertFrom-Json
          $ver = $v.version
          $parts = $ver -split '\.'
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = if ($parts.Count -gt 2) { [int]$parts[2] } else { 0 }
          $vi = @"
          # UTF-8 编码
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=($major, $minor, $patch, 0),
              prodvers=($major, $minor, $patch, 0),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
            ),
            kids=[
              StringFileInfo(
                [
                  StringTable(
                    '040904b0',
                    [
                      StringStruct('CompanyName', '忆安'),
                      StringStruct('FileDescription', '忆安的脚本'),
                      StringStruct('FileVersion', '$ver.0'),
                      StringStruct('InternalName', 'python'),
                      StringStruct('LegalCopyright', 'LegalCopyright'),
                      StringStruct('OriginalFilename', '脚本.exe'),
                      StringStruct('ProductName', '脚本'),
                      StringStruct('ProductVersion', '$ver.0')
                    ])
                ]),
              VarFileInfo([VarStruct('Translation', [0x409, 1200])])
            ]
          )
          "@
          Set-Content -Path "version_info.txt" -Value $vi -Encoding UTF8
          Write-Host "Updated version_info.txt to $ver"
          $spec = Get-Content "serveScript.spec" -Raw
          $spec = $spec -replace "name='脚本v[^']*'", "name='脚本v$ver'"
          Set-Content -Path "serveScript.spec" -Value $spec -Encoding UTF8
          Write-Host "Updated serveScript.spec exe name to 脚本v$ver"
        shell: pwsh

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller serveScript.spec --noconfirm
          $exes = Get-ChildItem -Path dist -Filter "*.exe" -ErrorAction SilentlyContinue
          foreach ($e in $exes) {
            Write-Host "Found exe: $($e.FullName) ($($e.Length) bytes)"
          }
          if ($exes.Count -eq 0) {
            Write-Host "::error::No exe files found in dist/"
            exit 1
          }
        shell: pwsh

      - name: Prepare release
        run: |
          New-Item -ItemType Directory -Path release -Force
          $v = Get-Content "version.json" -Raw | ConvertFrom-Json
          $ver = $v.version
          Write-Host "Building version: $ver"
          $src = (Get-ChildItem -Path dist -Filter "*.exe")[0]
          Copy-Item $src.FullName -Destination "release\脚本v$ver.exe"
          $v.release_date = (Get-Date -Format "yyyy-MM-dd")
          $v | ConvertTo-Json -Depth 10 | Set-Content -Path "release\version.json" -Encoding UTF8
          echo "VERSION=$ver" >> $env:GITHUB_ENV
          Write-Host "Release files ready"
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: menghuansanguo-script
          path: release/*
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "脚本v${{ env.VERSION }} #${{ github.run_number }}"
          body: "由 GitHub Actions 自动构建\n版本: ${{ env.VERSION }}\n提交: ${{ github.sha }}"
          files: release/*
          make_latest: true
